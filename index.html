<script>

// SENHA
const SENHA_ADMIN = "Lezinho1579@";

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyB_ykuegRpYthAQo1vIsGwMs2s6assUWok",
authDomain: "casaeachadosshopee.firebaseapp.com",
projectId: "casaeachadosshopee",
storageBucket: "casaeachadosshopee.firebasestorage.app",
messagingSenderId: "288736027823",
appId: "1:288736027823:web:d2e6e208efb345f7af605a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ELEMENTOS
const produtosContainer = document.getElementById("produtos");
const loginAdmin = document.getElementById("loginAdmin");
const adminPanel = document.getElementById("adminPanel");

const nomeInput = document.getElementById("nome");
const precoInput = document.getElementById("preco");
const imagemInput = document.getElementById("imagem");
const linkInput = document.getElementById("link");
const btnSalvar = document.getElementById("btnSalvar");

let adminLogado = false;
let editandoId = null;

// ATALHO
document.addEventListener("keydown", e=>{
if(e.ctrlKey && e.altKey && e.key==="a"){
loginAdmin.classList.toggle("hidden");
}
});

// LINK ADMIN
const params = new URLSearchParams(window.location.search);
if(params.get("painel")==="1579lz"){
loginAdmin.classList.remove("hidden");
}

// LOGIN
function verificarSenha(){
const senha = document.getElementById("senha").value;

if(senha===SENHA_ADMIN){
adminLogado=true;
loginAdmin.classList.add("hidden");
adminPanel.classList.remove("hidden");
renderProdutos();
}else{
alert("Senha incorreta");
}
}

// LISTAR
function renderProdutos(){

db.collection("produtos")
.orderBy("criadoEm","desc")
.onSnapshot(snapshot=>{

produtosContainer.innerHTML="";

snapshot.forEach(doc=>{

const p = doc.data();

produtosContainer.innerHTML += `
<div class="bg-gray-900 rounded-2xl shadow">

<img src="${p.imagem}" class="rounded-t-2xl">

<div class="p-4">

<h2>${p.nome}</h2>

<p class="text-green-400 font-bold">
🔥 Ver oferta atual
</p>

<button onclick="abrirShopee('${p.link}')"
class="w-full mt-2 bg-orange-500 py-2 rounded-xl">
🛒 APROVEITAR AGORA
</button>

${adminLogado ? `

<button onclick='editarProduto(${JSON.stringify(doc.id)}, ${JSON.stringify(p.nome)}, ${JSON.stringify(p.preco)}, ${JSON.stringify(p.imagem)}, ${JSON.stringify(p.link)})'
class="w-full mt-2 bg-yellow-500 py-2 rounded-xl text-black">
Editar ✏️
</button>

<button onclick="excluirProduto('${doc.id}')"
class="w-full mt-2 bg-red-500 py-2 rounded-xl">
Excluir ❌
</button>

` : ``}

</div>
</div>
`;

});

});
}

// EDITAR
function editarProduto(id,nome,preco,img,link){

nomeInput.value = nome;
precoInput.value = preco;
imagemInput.value = img;
linkInput.value = link;

editandoId = id;

// muda botão
btnSalvar.innerText = "Atualizar Produto ✏️";
btnSalvar.classList.remove("bg-orange-500");
btnSalvar.classList.add("bg-yellow-500");

window.scrollTo({top:0,behavior:"smooth"});
}

// SALVAR
function addProduto(){

const nome = nomeInput.value;
const preco = precoInput.value;
const imagem = imagemInput.value;
const link = linkInput.value;

if(!nome || !preco || !imagem || !link){
alert("Preencha todos os campos");
return;
}

if(editandoId){

db.collection("produtos").doc(editandoId).update({
nome, preco, imagem, link
});

alert("Produto atualizado ✅");
editandoId = null;

}else{

db.collection("produtos").add({
nome, preco, imagem, link,
criadoEm: firebase.firestore.FieldValue.serverTimestamp()
});

alert("Produto publicado 🚀");
}

// limpar
nomeInput.value = "";
precoInput.value = "";
imagemInput.value = "";
linkInput.value = "";

// voltar botão
btnSalvar.innerText = "Salvar Produto";
btnSalvar.classList.remove("bg-yellow-500");
btnSalvar.classList.add("bg-orange-500");

}

// EXCLUIR
function excluirProduto(id){
if(confirm("Deseja excluir?")){
db.collection("produtos").doc(id).delete();
}
}

// ABRIR
function abrirShopee(link){
window.open(link,"_blank");
}

// INICIAR
renderProdutos();

</script>
