<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CasaeAchadosShopee</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- FIREBASE (CARREGA ANTES DE TUDO) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body class="bg-gray-800 text-white font-sans">

<header class="bg-gray-900 p-4 text-center text-xl font-bold">
CasaeAchadosShopee 🔥
</header>

<!-- LOGIN -->
<section id="loginAdmin" class="hidden text-center mt-6">
<input id="senha" type="password" placeholder="Senha"
class="text-black p-2 rounded">
<button onclick="verificarSenha()"
class="bg-orange-500 px-4 py-2 rounded">Entrar</button>
</section>

<!-- ADMIN -->
<section id="adminPanel" class="hidden text-center mt-6">

<input id="nome" placeholder="Nome"
class="text-black p-2 m-1 rounded">
<input id="preco" placeholder="Preço"
class="text-black p-2 m-1 rounded">
<input id="imagem" placeholder="Imagem URL"
class="text-black p-2 m-1 rounded">
<input id="link" placeholder="Link afiliado"
class="text-black p-2 m-1 rounded">

<button onclick="addProduto()"
class="bg-orange-500 px-6 py-2 rounded">
Salvar Produto
</button>

</section>

<!-- PRODUTOS -->
<main id="produtos" class="p-4 grid md:grid-cols-3 gap-4"></main>

<footer class="text-center p-4 bg-black">
© 2026 CasaeAchadosShopee
</footer>

<!-- SCRIPT SEM ERRO -->
<script>

// SENHA
const SENHA_ADMIN = "Lezinho1579@";

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyB_ykuegRpYthAQo1vIsGwMs2s6assUWok",
authDomain: "casaeachadosshopee.firebaseapp.com",
projectId: "casaeachadosshopee"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ELEMENTOS
const produtosContainer = document.getElementById("produtos");
const loginAdmin = document.getElementById("loginAdmin");
const adminPanel = document.getElementById("adminPanel");

let adminLogado = false;

// ATALHO ADMIN
document.addEventListener("keydown", e=>{
if(e.ctrlKey && e.altKey && e.key==="a"){
loginAdmin.classList.toggle("hidden");
}
});

// LOGIN
function verificarSenha(){
if(document.getElementById("senha").value===SENHA_ADMIN){
adminLogado=true;
loginAdmin.classList.add("hidden");
adminPanel.classList.remove("hidden");
renderProdutos();
}
}

// LISTAR (SEM BUG)
function renderProdutos(){

db.collection("produtos")
.orderBy("criadoEm","desc")
.onSnapshot(snapshot=>{

produtosContainer.innerHTML="";

snapshot.forEach(doc=>{

const p = doc.data();

const card = document.createElement("div");
card.className = "bg-gray-900 p-3 rounded";

const img = document.createElement("img");
img.src = p.imagem;

const nome = document.createElement("h2");
nome.innerText = p.nome;

const preco = document.createElement("p");
preco.className = "text-green-400";
preco.innerText = "🔥 Ver oferta atual";

const btn = document.createElement("button");
btn.innerText = "🛒 Comprar";
btn.className = "bg-orange-500 w-full py-2 mt-2 rounded";
btn.onclick = ()=> window.open(p.link);

card.appendChild(img);
card.appendChild(nome);
card.appendChild(preco);
card.appendChild(btn);

// BOTÕES ADMIN
if(adminLogado){

const editar = document.createElement("button");
editar.innerText = "Editar ✏️";
editar.className = "bg-yellow-500 w-full mt-2 py-2 rounded";
editar.onclick = ()=>{
document.getElementById("nome").value = p.nome;
document.getElementById("preco").value = p.preco;
document.getElementById("imagem").value = p.imagem;
document.getElementById("link").value = p.link;
window.scrollTo({top:0,behavior:"smooth"});
};

const excluir = document.createElement("button");
excluir.innerText = "Excluir ❌";
excluir.className = "bg-red-500 w-full mt-2 py-2 rounded";
excluir.onclick = ()=> db.collection("produtos").doc(doc.id).delete();

card.appendChild(editar);
card.appendChild(excluir);
}

produtosContainer.appendChild(card);

});

});
}

// ADD
function addProduto(){

const nome=document.getElementById("nome").value;
const preco=document.getElementById("preco").value;
const imagem=document.getElementById("imagem").value;
const link=document.getElementById("link").value;

if(!nome||!preco||!imagem||!link){
alert("Preencha tudo");
return;
}

db.collection("produtos").add({
nome, preco, imagem, link,
criadoEm: firebase.firestore.FieldValue.serverTimestamp()
});

alert("Produto publicado 🚀");
}

// INICIAR
renderProdutos();

</script>

</body>
</html>
