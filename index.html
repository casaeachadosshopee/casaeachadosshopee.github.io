<script>

// SENHA ADMIN
const SENHA_ADMIN = "Lezinho1579@";

// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyB_ykuegRpYthAQo1vIsGwMs2s6assUWok",
authDomain: "casaeachadosshopee.firebaseapp.com",
projectId: "casaeachadosshopee",
storageBucket: "casaeachadosshopee.firebasestorage.app",
messagingSenderId: "288736027823",
appId: "1:288736027823:web:d2e6e208efb345f7af605a"
};

// iniciar firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ELEMENTOS
const produtosContainer = document.getElementById("produtos");
const loginAdmin = document.getElementById("loginAdmin");
const adminPanel = document.getElementById("adminPanel");

let adminLogado = false;
let editandoId = null;

// ATALHO ADMIN
document.addEventListener("keydown", function(e){
if(e.ctrlKey && e.altKey && e.key.toLowerCase()==="a"){
loginAdmin.classList.toggle("hidden");
}
});

// ADMIN POR LINK
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get("painel") === "1579lz"){
loginAdmin.classList.remove("hidden");
}

// LOGIN
function verificarSenha(){
const senha = document.getElementById("senha").value;

if(senha === SENHA_ADMIN){
adminLogado = true;
loginAdmin.classList.add("hidden");
adminPanel.classList.remove("hidden");
renderProdutos();
}else{
alert("Senha incorreta");
}
}

// LISTAR
function renderProdutos(){
produtosContainer.innerHTML="Carregando...";

db.collection("produtos")
.orderBy("criadoEm","desc")
.onSnapshot(snapshot=>{

produtosContainer.innerHTML="";

snapshot.forEach(doc=>{
const prod=doc.data();

produtosContainer.innerHTML+=`

<div class="bg-gray-900 rounded-2xl shadow hover:shadow-xl transition">

<img src="${prod.imagem}" class="rounded-t-2xl" />

<div class="p-4">

<h2 class="font-semibold">
${prod.nome}
</h2>

<p class="text-green-400 font-bold mt-1">
${prod.preco}
</p>

<button onclick="abrirShopee('${prod.link}')"
class="block w-full mt-3 bg-orange-500 text-white py-2 rounded-xl">
Abrir na Shopee 🛒
</button>

${adminLogado ? `

<button onclick="editarProduto('${doc.id}', '${prod.nome}', '${prod.preco}', '${prod.imagem}', '${prod.link}')"
class="block w-full mt-2 bg-yellow-500 text-black py-2 rounded-xl">
Editar ✏️
</button>

<button onclick="excluirProduto('${doc.id}')"
class="block w-full mt-2 bg-red-500 text-white py-2 rounded-xl">
Excluir ❌
</button>

` : ``}

</div>
</div>

`;

});

});
}

// EDITAR
function editarProduto(id, nome, preco, imagem, link){

document.getElementById("nome").value = nome;
document.getElementById("preco").value = preco;
document.getElementById("imagem").value = imagem;
document.getElementById("link").value = link;

editandoId = id;

window.scrollTo({ top: 0, behavior: "smooth" });

}

// ADD OU UPDATE
function addProduto(){

const nome=document.getElementById("nome").value;
const preco=document.getElementById("preco").value;
const imagem=document.getElementById("imagem").value;
const link=document.getElementById("link").value;

if(!nome||!preco||!imagem||!link){
alert("Preencha todos os campos");
return;
}

// EDITANDO
if(editandoId){

db.collection("produtos").doc(editandoId).update({
nome,
preco,
imagem,
link
});

alert("Produto atualizado ✅");
editandoId = null;

}else{

// NOVO
db.collection("produtos").add({
nome,
preco,
imagem,
link,
criadoEm: firebase.firestore.FieldValue.serverTimestamp()
});

alert("Produto publicado 🚀");
}

// LIMPAR CAMPOS
document.getElementById("nome").value="";
document.getElementById("preco").value="";
document.getElementById("imagem").value="";
document.getElementById("link").value="";

}

// EXCLUIR
function excluirProduto(id){
if(confirm("Deseja excluir este produto?")){
db.collection("produtos").doc(id).delete();
alert("Produto excluído");
}
}

// ABRIR SHOPEE
function abrirShopee(link){

const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

if(isMobile){
window.location.href=link.replace("https://shopee.com.br","shopee://");

setTimeout(()=>{
window.open(link,"_blank");
},1200);

}else{
window.open(link,"_blank");
}

}

// carregar
renderProdutos();

</script>
