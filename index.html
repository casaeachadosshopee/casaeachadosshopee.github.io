<script>

// SENHA ADMIN
const SENHA_ADMIN = "Lezinho1579@";

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyB_ykuegRpYthAQo1vIsGwMs2s6assUWok",
authDomain: "casaeachadosshopee.firebaseapp.com",
projectId: "casaeachadosshopee",
storageBucket: "casaeachadosshopee.firebasestorage.app",
messagingSenderId: "288736027823",
appId: "1:288736027823:web:d2e6e208efb345f7af605a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ELEMENTOS
const produtosContainer = document.getElementById("produtos");
const loginAdmin = document.getElementById("loginAdmin");
const adminPanel = document.getElementById("adminPanel");

let adminLogado = false;

// ATALHO ADMIN
document.addEventListener("keydown", function(e){
if(e.ctrlKey && e.altKey && e.key.toLowerCase()==="a"){
loginAdmin.classList.toggle("hidden");
}
});

// ADMIN LINK
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get("painel") === "1579lz"){
loginAdmin.classList.remove("hidden");
}

// LOGIN
function verificarSenha(){
const senha = document.getElementById("senha").value;

if(senha === SENHA_ADMIN){
adminLogado = true;
loginAdmin.classList.add("hidden");
adminPanel.classList.remove("hidden");
renderProdutos();
}else{
alert("Senha incorreta");
}
}

// LISTAR (SEM QUEBRAR)
function renderProdutos(){

db.collection("produtos")
.orderBy("criadoEm","desc")
.onSnapshot(snapshot=>{

produtosContainer.innerHTML="";

snapshot.forEach(doc=>{

const prod = doc.data();

// CRIANDO ELEMENTOS (SEM innerHTML perigoso)
const card = document.createElement("div");
card.className = "bg-gray-900 rounded-2xl shadow";

const img = document.createElement("img");
img.src = prod.imagem;
img.className = "rounded-t-2xl";

const box = document.createElement("div");
box.className = "p-4";

const nome = document.createElement("h2");
nome.innerText = prod.nome;

const preco = document.createElement("p");
preco.className = "text-green-400";
preco.innerText = prod.preco;

// botão shopee
const btn = document.createElement("button");
btn.innerText = "Abrir na Shopee 🛒";
btn.className = "block w-full mt-3 bg-orange-500 py-2 rounded-xl";
btn.onclick = ()=> abrirShopee(prod.link);

box.appendChild(nome);
box.appendChild(preco);
box.appendChild(btn);

// BOTÕES ADMIN
if(adminLogado){

const editarBtn = document.createElement("button");
editarBtn.innerText = "Editar ✏️";
editarBtn.className = "block w-full mt-2 bg-yellow-500 py-2 rounded-xl";
editarBtn.onclick = ()=> editarProduto(doc.id, prod);

const excluirBtn = document.createElement("button");
excluirBtn.innerText = "Excluir ❌";
excluirBtn.className = "block w-full mt-2 bg-red-500 py-2 rounded-xl";
excluirBtn.onclick = ()=> excluirProduto(doc.id);

box.appendChild(editarBtn);
box.appendChild(excluirBtn);

}

card.appendChild(img);
card.appendChild(box);

produtosContainer.appendChild(card);

});

});
}

// EDITAR
function editarProduto(id, prod){

document.getElementById("nome").value = prod.nome;
document.getElementById("preco").value = prod.preco;
document.getElementById("imagem").value = prod.imagem;
document.getElementById("link").value = prod.link;

window.scrollTo({ top: 0, behavior: "smooth" });

}

// ADD
function addProduto(){

const nome=document.getElementById("nome").value;
const preco=document.getElementById("preco").value;
const imagem=document.getElementById("imagem").value;
const link=document.getElementById("link").value;

if(!nome||!preco||!imagem||!link){
alert("Preencha todos os campos");
return;
}

db.collection("produtos").add({
nome, preco, imagem, link,
criadoEm: firebase.firestore.FieldValue.serverTimestamp()
});

alert("Produto publicado 🚀");

}

// EXCLUIR
function excluirProduto(id){
if(confirm("Deseja excluir?")){
db.collection("produtos").doc(id).delete();
}
}

// ABRIR
function abrirShopee(link){
window.open(link,"_blank");
}

// START
renderProdutos();

</script>
